packages:
  - apps/*
  - packages/*
  - design-system

allowBuilds:
  better-sqlite3: true
  esbuild: true
  spawn-sync: true

dedupePeers: true

ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - '@meowdown/*'
  - '@prosekit/*'
  - '@aria-ui/*'
  - virtua@0.49.2

# Uncomment the "blockExoticSubdeps" and "overrides" sections below to install packages from pkg.pr.new
# TODO(ai-menu): temporary snapshot of prosekit/meowdown#191 (selection menu +
# pending replacement); drop once a meowdown release ships and the
# apps/desktop dependency is bumped instead.
blockExoticSubdeps: false
overrides:
  '@meowdown/core': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/core@5073906'
  '@meowdown/react': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/react@5073906'
