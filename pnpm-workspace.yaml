packages:
  - apps/*
  - packages/*
  - design-system

allowBuilds:
  better-sqlite3: true
  esbuild: true
  spawn-sync: true

dedupePeers: true

ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - '@meowdown/*'
  - '@prosekit/*'
  - virtua@0.49.2

# Uncomment the  "blockExoticSubdeps" and "overrides" below to install packages from pkg.pr.new
blockExoticSubdeps: false
overrides:
  '@meowdown/core': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/core@8d52df6'
  '@meowdown/react': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/react@8d52df6'
