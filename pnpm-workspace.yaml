packages:
  - apps/*
  - packages/*
  - design-system

allowBuilds:
  '@sentry/cli': true
  better-sqlite3: true
  esbuild: true
  spawn-sync: true

dedupePeers: true

ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - '@meowdown/*'
  - '@prosekit/*'
  - '@aria-ui/*'
  - prosemirror-flat-list
  - prosemirror-view
  - '@floating-ui/core@1.8.0'
  - '@floating-ui/dom@1.8.0'
  - '@floating-ui/utils@0.2.12'
  - prosemirror-model@1.25.11

overrides:
  '@meowdown/core': https://pkg.pr.new/prosekit/meowdown/@meowdown/core@867a4d6
  '@meowdown/react': https://pkg.pr.new/prosekit/meowdown/@meowdown/react@867a4d6
blockExoticSubdeps: false
